<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-6 font-['Cairo']">

    <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-lg space-y-6">
        <h2 class="text-xl font-bold text-slate-800 border-b pb-3">جرب بنفسك: لوحة تحكم المتجر 🛠️</h2>
        <p class="text-xs text-slate-500">اكتب بيانات المنتج الجديد تحت واضغط إضافة، وبعدين افتح المتجر هتلاقيه نزل فوراً!</p>

        <form id="demo-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold mb-1">اسم المنتج:</label>
                <input type="text" id="p-name" required placeholder="مثال: كوتشي أبيض مستورد" class="w-full p-2 border rounded-lg text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1">السعر (جنيه):</label>
                <input type="number" id="p-price" required placeholder="450" class="w-full p-2 border rounded-lg text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold mb-1">رابط الصورة (تقدر تسيبه زي ما هو للتجربة):</label>
                <input type="url" id="p-image" value="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" class="w-full p-2 border rounded-lg text-sm text-slate-400">
            </div>
            <button type="submit" class="w-full bg-slate-900 hover:bg-amber-600 text-white font-bold py-2.5 rounded-lg text-sm transition-colors">
                إضافة المنتج للمتجر الآن ✨
            </button>
        </form>

        <div class="text-center pt-2">
            <a href="index.html" target="_blank" class="text-xs text-amber-600 font-bold underline">اضغط هنا لفتح المتجر في صفحة جديدة ورؤية التعديل 👈</a>
        </div>
    </div>

    <script>
        document.getElementById('demo-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // جلب المنتجات الحالية من الـ Local Storage أو عمل مصفوفة فارغة
            let products = JSON.parse(localStorage.getItem('store_products')) || [];
            
            // إضافة المنتج الجديد
            const newProduct = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                image: document.getElementById('p-image').value,
                category: "clothes"
            };
            
            products.push(newProduct);
            localStorage.setItem('store_products', JSON.stringify(products));
            
            alert("ممتاز! تم إضافة المنتج بنجاح. افتح المتجر الآن لتراه بنفسك.");
            this.reset();
        });
    </script>
</body>
</html>
